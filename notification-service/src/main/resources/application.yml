spring:
  application:
    name: notification-service
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/estore_notifications
    username: ${DB_USERNAME:estore}
    password: ${DB_PASSWORD:estore}
  sql:
    init:
      mode: always
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.estore: DEBUG
    org.springframework: INFO
