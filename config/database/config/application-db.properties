# =============================================================================
# E-Store Application — PostgreSQL Database Connection Properties
# =============================================================================
# Copy this file to application-db.properties and fill in environment-specific
# values. Never commit secrets to version control.
# =============================================================================

# ---------------------------------------------------------------------------
# Product Catalog Service
# ---------------------------------------------------------------------------
product-catalog.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/product_catalog_db?currentSchema=product_catalog&sslmode=${DB_SSL_MODE:prefer}
product-catalog.datasource.username=${PRODUCT_CATALOG_DB_USER:product_catalog_user}
product-catalog.datasource.password=${PRODUCT_CATALOG_DB_PASSWORD:change_me_in_production}
product-catalog.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------------------------
# User Management Service
# ---------------------------------------------------------------------------
user-management.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/user_management_db?currentSchema=user_management&sslmode=${DB_SSL_MODE:prefer}
user-management.datasource.username=${USER_MANAGEMENT_DB_USER:user_management_user}
user-management.datasource.password=${USER_MANAGEMENT_DB_PASSWORD:change_me_in_production}
user-management.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------------------------
# Order Management Service
# ---------------------------------------------------------------------------
order-management.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/order_management_db?currentSchema=order_management&sslmode=${DB_SSL_MODE:prefer}
order-management.datasource.username=${ORDER_MANAGEMENT_DB_USER:order_management_user}
order-management.datasource.password=${ORDER_MANAGEMENT_DB_PASSWORD:change_me_in_production}
order-management.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------------------------
# Payment Processing Service
# ---------------------------------------------------------------------------
payment-processing.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/payment_processing_db?currentSchema=payment_processing&sslmode=${DB_SSL_MODE:prefer}
payment-processing.datasource.username=${PAYMENT_PROCESSING_DB_USER:payment_processing_user}
payment-processing.datasource.password=${PAYMENT_PROCESSING_DB_PASSWORD:change_me_in_production}
payment-processing.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------------------------
# Notification Service
# ---------------------------------------------------------------------------
notification-service.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/notification_service_db?currentSchema=notification_service&sslmode=${DB_SSL_MODE:prefer}
notification-service.datasource.username=${NOTIFICATION_SERVICE_DB_USER:notification_service_user}
notification-service.datasource.password=${NOTIFICATION_SERVICE_DB_PASSWORD:change_me_in_production}
notification-service.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------------------------
# Flyway / Liquibase migration settings (per service — example for product catalog)
# ---------------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.url=${product-catalog.datasource.url}
spring.flyway.user=${product-catalog.datasource.username}
spring.flyway.password=${product-catalog.datasource.password}
spring.flyway.schemas=product_catalog
spring.flyway.locations=classpath:db/migration/product-catalog
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
